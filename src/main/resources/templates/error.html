<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error — Escuela Internacional de Idiomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        :root {
            --navy:#0d1f3c; --navy-light:#1a3260; --gold:#b8862a; --gold-light:#d4a84b;
            --cream:#faf8f3; --white:#ffffff; --text-mid:#4a5568; --text-light:#8a94a6; --border:#e8e2d6;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--cream); color:#1a1a2e; min-height:100vh; display:flex; flex-direction:column; }

        nav {
            background:var(--white); border-bottom:1px solid var(--border);
            padding:0 4rem; display:flex; justify-content:space-between; align-items:center;
            height:68px; box-shadow:0 2px 20px rgba(0,0,0,0.04);
        }
        .brand { text-decoration:none; }
        .brand-name { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--navy); line-height:1; }
        .brand-sub { font-size:0.57rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); }

        .error-main {
            flex:1; display:flex; align-items:center; justify-content:center;
            padding:4rem 2rem; position:relative; overflow:hidden;
        }
        .error-bg-text {
            position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
            font-family:'Playfair Display',serif; font-size:clamp(14rem,30vw,22rem);
            font-weight:700; color:rgba(13,31,60,0.04); white-space:nowrap;
            pointer-events:none; user-select:none; line-height:1;
        }
        .error-card {
            background:var(--white); border:1px solid var(--border); border-radius:20px;
            padding:4rem 3.5rem; text-align:center; max-width:520px; width:100%;
            box-shadow:0 12px 40px rgba(0,0,0,0.06); position:relative; z-index:1;
            animation:fadeUp 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        .error-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:4px;
            background:linear-gradient(90deg,var(--navy),var(--gold),var(--navy));
            border-radius:20px 20px 0 0;
        }
        .error-code {
            font-family:'Playfair Display',serif; font-size:5rem; font-weight:700;
            color:var(--navy); line-height:1; margin-bottom:0.5rem;
            letter-spacing:-0.04em;
        }
        .error-divider {
            width:48px; height:3px; background:var(--gold); margin:1.25rem auto;
            border-radius:2px;
        }
        .error-title {
            font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700;
            color:var(--navy); margin-bottom:0.75rem; letter-spacing:-0.01em;
        }
        .error-msg {
            font-size:0.9rem; color:var(--text-mid); line-height:1.7; margin-bottom:2.5rem; font-weight:300;
        }
        .error-detail {
            background:var(--cream); border:1px solid var(--border); border-radius:8px;
            padding:0.75rem 1rem; font-size:0.75rem; color:var(--text-light);
            font-family:monospace; margin-bottom:2rem; text-align:left; word-break:break-all;
        }
        .error-actions { display:flex; gap:0.85rem; justify-content:center; flex-wrap:wrap; }
        .btn-main {
            background:var(--navy); color:#fff; text-decoration:none;
            padding:0.8rem 2rem; border-radius:8px; font-size:0.88rem; font-weight:500;
            border:2px solid var(--navy); transition:all 0.25s;
        }
        .btn-main:hover { background:var(--navy-light); border-color:var(--navy-light); color:#fff; transform:translateY(-2px); }
        .btn-outline {
            background:transparent; color:var(--navy); text-decoration:none;
            padding:0.8rem 2rem; border-radius:8px; font-size:0.88rem; font-weight:500;
            border:2px solid var(--border); transition:all 0.25s; cursor:pointer; font-family:'DM Sans',sans-serif;
        }
        .btn-outline:hover { border-color:var(--navy); transform:translateY(-2px); }

        footer {
            background:var(--navy); color:rgba(255,255,255,0.45);
            text-align:center; padding:1.5rem 2rem; font-size:0.76rem; border-top:3px solid var(--gold);
        }

        @keyframes fadeUp { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/inicio}" class="brand">
        <div class="brand-name">Escuela Internacional de Idiomas</div>
        <div class="brand-sub">Est. 1998 · Madrid</div>
    </a>
</nav>

<div class="error-main">
    <div class="error-bg-text" th:text="${status}">404</div>
    <div class="error-card">
        <div class="error-code" th:text="${status}">404</div>
        <div class="error-divider"></div>
        <div class="error-title" th:text="${error ?: 'Algo salió mal'}">Página no encontrada</div>
        <p class="error-msg" th:text="${message ?: 'La página que buscas no existe o no está disponible en este momento. Comprueba la dirección e inténtalo de nuevo.'}">
            La página que buscas no existe.
        </p>
        <div class="error-detail" th:if="${timestamp}" th:text="'Error en: ' + ${timestamp}"></div>
        <div class="error-actions">
            <a th:href="@{/inicio}" class="btn-main">Ir al inicio</a>
            <button onclick="history.back()" class="btn-outline">← Volver atrás</button>
        </div>
    </div>
</div>

<footer>
    <b style="color:rgba(255,255,255,0.7)">Escuela Internacional de Idiomas</b> · Plataforma de gestión académica
</footer>
</body>
</html>
