<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inscripciones — Escuela Internacional de Idiomas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        :root {
            --navy:#0d1f3c; --navy-light:#1a3260; --gold:#b8862a; --gold-light:#d4a84b;
            --cream:#faf8f3; --white:#ffffff; --text-mid:#4a5568; --text-light:#8a94a6; --border:#e8e2d6;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'DM Sans',sans-serif; background:var(--cream); color:#1a1a2e; min-height:100vh; }

        nav {
            background:var(--white); border-bottom:1px solid var(--border);
            padding:0 4rem; display:flex; justify-content:space-between; align-items:center;
            height:68px; position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,0.04);
        }
        .brand { text-decoration:none; }
        .brand-name { font-family:'Playfair Display',serif; font-size:1.1rem; font-weight:700; color:var(--navy); line-height:1; }
        .brand-sub { font-size:0.57rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); }
        .nav-links { display:flex; gap:0; list-style:none; height:100%; align-items:center; }
        .nav-links li { height:100%; display:flex; align-items:center; }
        .nav-links a {
            color:var(--text-mid); text-decoration:none; font-size:0.84rem; font-weight:500;
            padding:0 1.2rem; height:100%; display:flex; align-items:center;
            border-bottom:2px solid transparent; transition:all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active { color:var(--navy); border-bottom-color:var(--gold); }
        .nav-cta {
            background:var(--navy) !important; color:#fff !important; border-radius:6px !important;
            padding:0.55rem 1.3rem !important; height:auto !important; border-bottom:none !important; margin-left:0.5rem;
        }
        .nav-cta:hover { background:var(--navy-light) !important; }

        .page-header {
            background:var(--white); border-bottom:1px solid var(--border);
            padding:2.5rem 4rem; display:flex; justify-content:space-between; align-items:flex-end;
            animation:fadeUp 0.5s ease both;
        }
        .breadcrumb-nav { display:flex; align-items:center; gap:0.5rem; font-size:0.75rem; color:var(--text-light); margin-bottom:0.5rem; }
        .breadcrumb-nav a { color:var(--gold); text-decoration:none; }
        .page-title { font-family:'Playfair Display',serif; font-size:1.9rem; font-weight:700; color:var(--navy); letter-spacing:-0.02em; }
        .page-count { font-size:0.82rem; color:var(--text-light); }
        .btn-gold {
            background:var(--gold); color:#fff; text-decoration:none; padding:0.7rem 1.6rem;
            border-radius:8px; font-size:0.85rem; font-weight:600; transition:all 0.2s; white-space:nowrap;
        }
        .btn-gold:hover { background:var(--gold-light); color:#fff; transform:translateY(-2px); box-shadow:0 6px 20px rgba(184,134,42,0.3); }

        /* Search bar */
        .search-bar {
            padding:1.25rem 4rem; background:var(--white); border-bottom:1px solid var(--border);
        }
        .search-input-wrap {
            position:relative; max-width:380px;
        }
        .search-input-wrap input {
            width:100%; padding:0.65rem 1rem 0.65rem 2.5rem;
            border:1px solid var(--border); border-radius:8px;
            font-family:'DM Sans',sans-serif; font-size:0.85rem; color:#1a1a2e;
            background:var(--cream); outline:none; transition:border-color 0.2s;
        }
        .search-input-wrap input:focus { border-color:var(--gold); background:var(--white); }
        .search-icon { position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); font-size:0.9rem; pointer-events:none; }

        /* Cards grid */
        .cards-wrapper { padding:2rem 4rem; }
        .alumni-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:1rem;
            animation:fadeUp 0.6s ease 0.1s both;
        }
        .alumni-card {
            background:var(--white); border:1px solid var(--border); border-radius:14px;
            padding:1.5rem; display:flex; flex-direction:column; gap:1rem;
            transition:all 0.25s; position:relative; overflow:hidden;
        }
        .alumni-card:hover { transform:translateY(-4px); box-shadow:0 16px 36px rgba(13,31,60,0.08); border-color:rgba(184,134,42,0.3); }
        .alumni-card-top { display:flex; align-items:center; gap:0.9rem; }
        .avatar {
            width:42px; height:42px; border-radius:50%;
            background:linear-gradient(135deg, var(--navy), var(--navy-light));
            display:flex; align-items:center; justify-content:center;
            font-size:0.88rem; font-weight:700; color:#fff; flex-shrink:0;
            font-family:'Playfair Display',serif;
        }
        .alumni-info { flex:1; min-width:0; }
        .alumni-name { font-weight:600; color:var(--navy); font-size:0.92rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .alumni-email { font-size:0.74rem; color:var(--text-light); }
        .divider { height:1px; background:var(--border); }
        .alumni-details { display:flex; gap:0.75rem; flex-wrap:wrap; }
        .detail-pill {
            display:inline-flex; align-items:center; gap:0.3rem;
            padding:0.25rem 0.75rem; border-radius:100px;
            font-size:0.73rem; font-weight:500;
        }
        .pill-curso { background:rgba(13,31,60,0.05); color:var(--navy); }
        .pill-idioma { background:rgba(184,134,42,0.08); color:var(--gold); border:1px solid rgba(184,134,42,0.2); }

        .empty-state { text-align:center; padding:5rem 2rem; color:var(--text-light); }
        .empty-state h3 { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--navy); margin-bottom:0.5rem; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
<nav>
    <a th:href="@{/inicio}" class="brand">
        <div class="brand-name">Escuela Internacional de Idiomas</div>
        <div class="brand-sub">Est. 1998 · Madrid</div>
    </a>
    <ul class="nav-links">
        <li><a th:href="@{/listadoCursos}">Cursos</a></li>
        <li><a th:href="@{/listadoInscripciones}" class="active">Inscripciones</a></li>
        <li><a th:href="@{/altaInscripcion}" class="nav-cta">+ Nueva inscripción</a></li>
    </ul>
</nav>

<div class="page-header">
    <div>
        <div class="breadcrumb-nav"><a th:href="@{/inicio}">Inicio</a> › Inscripciones</div>
        <div class="page-title">Alumnos inscritos</div>
        <div class="page-count" th:text="${#lists.size(inscripciones)} + ' inscripciones registradas'">0 inscripciones</div>
    </div>
    <a th:href="@{/altaInscripcion}" class="btn-gold">+ Nueva inscripción</a>
</div>

<div class="search-bar">
    <div class="search-input-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar por nombre o idioma..." oninput="filterCards(this.value)"/>
    </div>
</div>

<div class="cards-wrapper">
    <div th:if="${#lists.isEmpty(inscripciones)}" class="empty-state">
        <h3>No hay inscripciones registradas</h3>
        <p>Añade la primera usando el botón de arriba.</p>
    </div>
    <div class="alumni-grid" id="alumniGrid" th:if="${!#lists.isEmpty(inscripciones)}">
        <div class="alumni-card"
             th:each="ins : ${inscripciones}"
             th:attr="data-search=${ins.nombreAlumno + ' ' + ins.apellidos + ' ' + ins.curso.idioma}">
            <div class="alumni-card-top">
                <div class="avatar" th:text="${#strings.substring(ins.nombreAlumno,0,1)}">M</div>
                <div class="alumni-info">
                    <div class="alumni-name" th:text="${ins.nombreAlumno + ' ' + ins.apellidos}"></div>
                    <div class="alumni-email" th:text="${ins.email}"></div>
                </div>
            </div>
            <div class="divider"></div>
            <div class="alumni-details">
                <span class="detail-pill pill-curso" th:text="'📚 ' + ${ins.curso.idioma} + ' · ' + ${ins.curso.nivel}"></span>
                <span class="detail-pill pill-idioma" th:text="'🌐 ' + ${ins.idiomMaterno}"></span>
            </div>
        </div>
    </div>
</div>

<script>
function filterCards(val) {
    const q = val.toLowerCase();
    document.querySelectorAll('.alumni-card').forEach(card => {
        card.style.display = card.dataset.search.toLowerCase().includes(q) ? '' : 'none';
    });
}
</script>
</body>
</html>
